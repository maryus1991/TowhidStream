version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    volumes:
      - db-data:/var/lib/postgresql/data/

    ports:
      - "5432:5432"

    env_file:
      - .env

#  nodejs:

  django:
    build: .
    container_name: django
    command:
      - python manage.py migrate
      - python manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres



volumes:
  db-data: